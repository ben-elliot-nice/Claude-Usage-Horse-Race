<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horse Race UI – v2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a1f;
    color: #e0e0e0;
    padding: 48px;
    display: flex;
    gap: 48px;
    align-items: flex-start;
    justify-content: center;
    flex-wrap: wrap;
  }

  .label-above {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
    margin-bottom: 10px;
    text-align: center;
  }

  .popover {
    width: 280px;
    background: rgba(30,30,36,0.97);
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    overflow: hidden;
  }

  .tab-bar {
    display: flex;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 0 12px;
  }
  .tab {
    flex: 1;
    padding: 10px 0;
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    color: #888;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab.active {
    color: #fff;
    border-bottom-color: #fff;
  }

  .race-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 6px;
  }
  .race-title {
    font-size: 11px;
    font-weight: 600;
    color: #888;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .race-refresh {
    font-size: 13px;
    color: #666;
    cursor: pointer;
  }

  .track-area {
    padding: 4px 14px 12px;
  }

  .track-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .track-name {
    font-size: 10px;
    font-weight: 500;
    color: #aaa;
    width: 38px;
    flex-shrink: 0;
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .track-name.you { color: #fff; font-weight: 700; }
  .track-name.stale { color: #444; }

  .track-line {
    flex: 1;
    height: 16px;
    position: relative;
    display: flex;
    align-items: center;
  }

  .track-dots {
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    transform: translateY(-50%);
    border-top: 2px dashed rgba(255,255,255,0.1);
  }
  .track-dots.stale {
    border-top-color: rgba(255,255,255,0.05);
  }
  .track-dots.you {
    border-top-color: rgba(255,255,255,0.18);
  }

  .finish-flag {
    position: absolute;
    right: -2px;
    top: 50%;
    transform: translateY(-60%);
    font-size: 11px;
  }
  .finish-flag.stale { opacity: 0.2; }

  .horse {
    position: absolute;
    font-size: 16px;
    transform: translateX(-50%);
    cursor: default;
    line-height: 1;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
    position: absolute;
  }
  .horse.stale {
    opacity: 0.25;
    filter: grayscale(1);
  }

  /* Tooltip on hover */
  .horse:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: 120%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20,20,24,0.95);
    border: 1px solid rgba(255,255,255,0.12);
    color: #ccc;
    font-size: 10px;
    padding: 5px 9px;
    border-radius: 7px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 10;
    font-family: -apple-system, sans-serif;
    line-height: 1.5;
  }

  .race-footer {
    padding: 6px 14px 10px;
    font-size: 9px;
    color: #555;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
</style>
</head>
<body>

<div>
  <div class="label-above">Option A — refined (stale = greyed, no icon)</div>
  <div class="popover">
    <div class="tab-bar">
      <div class="tab">Usage</div>
      <div class="tab active">🏇 Race</div>
    </div>

    <div class="race-header">
      <span class="race-title">NICE-TEAM</span>
      <span class="race-refresh">↺</span>
    </div>

    <div class="track-area">
      <!-- 1st: Alice 61% -->
      <div class="track-row">
        <div class="track-name">Alice</div>
        <div class="track-line">
          <div class="track-dots"></div>
          <span class="horse" style="left:61%" data-tip="Alice · $615 · 61% · 2m ago">🐴</span>
          <span class="finish-flag">🏁</span>
        </div>
      </div>

      <!-- 2nd: Ben (you) 42% -->
      <div class="track-row">
        <div class="track-name you">Ben</div>
        <div class="track-line">
          <div class="track-dots you"></div>
          <span class="horse" style="left:42%" data-tip="You · $420 · 42% · just now">🐴</span>
          <span class="finish-flag">🏁</span>
        </div>
      </div>

      <!-- 3rd: Carol 18% -->
      <div class="track-row">
        <div class="track-name">Carol</div>
        <div class="track-line">
          <div class="track-dots"></div>
          <span class="horse" style="left:18%" data-tip="Carol · $180 · 18% · 4m ago">🐴</span>
          <span class="finish-flag">🏁</span>
        </div>
      </div>

      <!-- 4th: Dave 9% — stale, greyed only, no icon -->
      <div class="track-row">
        <div class="track-name stale">Dave</div>
        <div class="track-line">
          <div class="track-dots stale"></div>
          <span class="horse stale" style="left:9%" data-tip="Dave · $90 · 9% · last seen 14m ago">🐴</span>
          <span class="finish-flag stale">🏁</span>
        </div>
      </div>
    </div>

    <div class="race-footer">Updated 12s ago · hover horses for details</div>
  </div>
</div>

</body>
</html>
